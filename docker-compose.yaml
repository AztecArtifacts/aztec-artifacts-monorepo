services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aztec-artifacts
      POSTGRES_PASSWORD: aztec-artifacts
      POSTGRES_DB: aztec-artifacts
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U aztec-artifacts -d aztec-artifacts' ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: '@aztec-artifacts/schema'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://aztec-artifacts:aztec-artifacts@postgres:5432/aztec-artifacts
    command: [ 'pnpm', 'migrate' ]
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: '@aztec-artifacts/service'
    depends_on:
      migrations:
        condition: service_completed_successfully
    ports:
      - '8080:8080'
    environment:
      DATABASE_URL: postgres://aztec-artifacts:aztec-artifacts@postgres:5432/aztec-artifacts
      PORT: 8080
    restart: unless-stopped
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:8080/health' ]
      interval: 10s
      timeout: 5s
      retries: 3

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: '@aztec-artifacts/seed'
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8080
    restart: 'no'

  inspector:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: '@aztec-artifacts/inspector'
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '4173:4173'
    environment:
      INSPECTOR_BASE_URL: http://localhost:8080
      PORT: 4173
    restart: unless-stopped

  example:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: '@aztec-artifacts/example'
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8080
    restart: 'no'


volumes:
  postgres_data:
