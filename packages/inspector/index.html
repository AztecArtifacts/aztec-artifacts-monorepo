<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aztec Artifacts Inspector</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 1.5rem;
        background: canvas;
        color: canvastext;
      }

      h1,
      h2 {
        margin-top: 0;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      fieldset {
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 8px;
        padding: 1rem;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      fieldset legend {
        padding: 0 0.5rem;
        font-weight: 600;
      }

      label {
        display: flex;
        flex-direction: column;
        font-size: 0.9rem;
        gap: 0.25rem;
        min-width: 180px;
      }

      input,
      button,
      select {
        font: inherit;
        padding: 0.5rem;
        border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
        border-radius: 6px;
        background: color-mix(in srgb, canvas 92%, transparent);
        color: inherit;
      }

      button {
        cursor: pointer;
        font-weight: 600;
      }

      #output {
        white-space: pre-wrap;
        background: color-mix(in srgb, canvas 92%, transparent);
        border-radius: 8px;
        padding: 1rem;
        font-size: 0.9rem;
        overflow-x: auto;
        min-height: 240px;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .status {
        font-size: 0.85rem;
        opacity: 0.8;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .row {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      @media (max-width: 600px) {
        body {
          padding: 1rem;
        }
      }
    </style>
    <script src="/runtime-config.js"></script>
  </head>
  <body>
    <main>
      <header>
        <h1>Aztec Artifacts Inspector</h1>
        <p>Minimal UI using the client package to explore tokens, contracts, and artifacts exposed by the API service.</p>
      </header>

      <section>
        <form id="connection-form">
          <fieldset>
            <legend>Connection</legend>
            <div class="row">
              <label>
                Service URL
                <input id="base-url" type="url" autocomplete="off" spellcheck="false" />
              </label>
              <label>
                Request cache mode
                <select id="cache-mode">
                  <option value="no-store">no-store</option>
                  <option value="default">default</option>
                  <option value="reload">reload</option>
                  <option value="no-cache">no-cache</option>
                  <option value="force-cache">force-cache</option>
                  <option value="only-if-cached">only-if-cached</option>
                </select>
              </label>
            </div>
            <div class="controls">
              <button id="apply-settings" type="submit">Apply</button>
              <span class="status" id="status"></span>
            </div>
          </fieldset>
        </form>
      </section>

      <section class="actions">
        <fieldset>
          <legend>Tokens</legend>
          <div class="row">
            <label>
              Limit
              <input id="tokens-limit" type="number" min="1" placeholder="25" />
            </label>
            <label>
              Cursor
              <input id="tokens-cursor" type="number" min="0" placeholder="" />
            </label>
          </div>
          <button id="load-tokens">Fetch tokens</button>
        </fieldset>

        <fieldset>
          <legend>Contract addresses</legend>
          <div class="row">
            <label>
              Limit
              <input id="addresses-limit" type="number" min="1" placeholder="25" />
            </label>
            <label>
              Cursor
              <input id="addresses-cursor" type="number" min="0" placeholder="" />
            </label>
          </div>
          <button id="load-addresses">Fetch contract addresses</button>
        </fieldset>

        <fieldset>
          <legend>Contracts</legend>
          <div class="row">
            <label>
              Contract address
              <input id="contract-address" placeholder="0x..." autocomplete="off" spellcheck="false" />
            </label>
            <label>
              Include artifact
              <select id="include-artifact">
                <option value="false">No</option>
                <option value="true">Yes</option>
              </select>
            </label>
          </div>
          <button id="load-contract">Fetch contract</button>
        </fieldset>

        <fieldset>
          <legend>Artifacts</legend>
          <div class="row">
            <label>
              Artifact or class ID
              <input id="artifact-id" placeholder="0x..." autocomplete="off" spellcheck="false" />
            </label>
          </div>
          <button id="load-artifact">Fetch artifact</button>
        </fieldset>

        <fieldset>
          <legend>Selectors</legend>
          <div class="row">
            <label>
              Selector
              <input id="selector" placeholder="0x..." autocomplete="off" spellcheck="false" />
            </label>
          </div>
          <button id="load-selector">Fetch signatures</button>
        </fieldset>
      </section>

      <section>
        <h2>Response</h2>
        <pre id="output">Ready. Use the controls above to query the service.</pre>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
